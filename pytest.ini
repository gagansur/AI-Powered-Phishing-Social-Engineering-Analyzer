[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    api: marks tests for API configuration (deselect with '-m "not api"')
    detection: marks tests for phishing detection patterns
    integration: marks tests as integration tests
    unit: marks tests as unit tests
